name: VN-Index and MA Ratio Analysis

on:
  repository_dispatch:
    types: [weekly_report]      # cron-job.org sẽ gọi event này
  workflow_dispatch:            # vẫn giữ để chạy tay khi cần test
    inputs:
      mode:
        description: "Chạy build, send-email, hay cả hai"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - build
          - send-email

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'both' || github.event.inputs.mode == 'build' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore cached OHLC data (tránh tải lại toàn bộ 6 năm mỗi lần)
        uses: actions/cache@v4
        with:
          path: hose_6years_data.csv
          key: hose-data-${{ github.run_id }}
          restore-keys: |
            hose-data-

      - name: Build report (tải dữ liệu + tính toán + vẽ biểu đồ)
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python analysis.py --build

      - name: Commit and push chart outputs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html *.pdf
          git commit -m "Auto-generated analysis report [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-reports
          path: |
            market_breadth_chart.pdf
            market_breadth_chart_ma10_ma20.pdf
            market_breadth_chart_ma50_ma200.pdf
          retention-days: 1

  send_email:
    needs: build
    if: ${{ always() && needs.build.result != 'failure' && (github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'both' || github.event.inputs.mode == 'send-email') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download PDFs artifact (nếu có, từ job build vừa chạy)
        uses: actions/download-artifact@v4
        with:
          name: pdf-reports
        continue-on-error: true   # Nếu chạy standalone send-email, dùng luôn PDF đã commit sẵn trong repo

      - name: Send email with PDFs
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
        run: python analysis.py --send-email

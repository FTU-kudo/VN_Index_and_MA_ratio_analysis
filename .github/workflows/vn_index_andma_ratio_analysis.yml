name: VN-Index and MA Ratio Analysis

on:
  schedule:
    - cron: '0 13 * * 0' # 13:00 UTC (20:00 GMT+7) every Sunday
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run analysis script
      env:
        VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
      run: |
        python analysis.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *.html *.csv *.pdf
        git commit -m "Auto-generated analysis report [skip ci]" || echo "No changes to commit"
        git push
